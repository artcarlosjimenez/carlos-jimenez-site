/* ── SNOW ── */
#snow-canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}


/* ── Artist name bottom-center ── */
#artist-name {
  position: fixed;
  bottom: 1.8rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  pointer-events: none;
  font-family: "Krona One", sans-serif;
  font-size: .78rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  opacity: .7;
  line-height: 1.2;
  white-space: nowrap;
  transition: opacity 2.5s;
  color: #fff;
}


/* ── CURSOR 4D ── */
* { cursor: none !important; }
#cursor-cv {
  position: fixed;
  top: 0; left: 0;
  width: 90px; height: 90px;
  pointer-events: none;
  z-index: 99999;
}

    /* Standalone overrides */
    html, body {

function openLightbox(src, title) {
  var lb = document.getElementById("lightbox");
  var lbimg = document.getElementById("lb-img");
  var lbtitle = document.getElementById("lb-title");
  if (!lb || !lbimg) return;
  lbimg.src = src;
  if (lbtitle) lbtitle.textContent = title || "";
  lb.style.display = "flex";
  requestAnimationFrame(function() {
    lb.style.opacity = "1";
  });
}

function closeLightbox() {
  var lb = document.getElementById("lightbox");
  if (!lb) return;
  lb.style.opacity = "0";
  setTimeout(function() { lb.style.display = "none"; }, 400);
}

// Build navigation dots
window.addEventListener("DOMContentLoaded", function() {
  var dc = document.getElementById("da-dots");

    panels.forEach(function(p, i) {

<div id="lightbox" onclick="closeLightbox()" style="position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0);display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .4s;cursor:pointer;">

<script>
/* ─── CILINDRO 3D ─── */
(function(){
  function initCylinder(){
    var dgl = document.getElementById('dgl');
    if(!dgl || document.getElementById('daw-ring')) return;

    var panels = [].slice.call(dgl.querySelectorAll('.daw'));
    var N = panels.length;
    if(!N) return;

    /* Dimensiones */
    var vw = window.innerWidth, vh = window.innerHeight;
    var pw = Math.round(Math.min(vw * 0.18, 195));
    var ph = Math.round(Math.min(vh * 0.55, pw * 1.55));
    var radius = Math.round((pw + 24) / (2 * Math.tan(Math.PI / N)));

    /* Anillo — contenedor 3D */
    var ring = document.createElement('div');
    ring.id = 'daw-ring';
    ring.style.cssText = [
      'position:relative',
      'width:' + pw + 'px',
      'height:' + ph + 'px',
      'transform-style:preserve-3d',
      '-webkit-transform-style:preserve-3d',
      'flex-shrink:0'
    ].join(';');

    /* Posicionar cada panel en el cilindro */
    panels.forEach(function(p, i){
      var angle = (360 / N) * i;
      var tf    = 'rotateY(' + angle + 'deg) translateZ(' + radius + 'px)';

      /* Forzar estilos via JS (mayor especificidad que cualquier clase CSS) */
      p.style.cssText = [
        'position:absolute',
        'top:0', 'left:0', 'right:auto', 'bottom:auto',
        'width:'  + pw + 'px',
        'height:' + ph + 'px',
        'opacity:1',
        'pointer-events:all',
        'display:flex',
        'align-items:center',
        'justify-content:center',
        'transition:box-shadow .3s',
        'backface-visibility:hidden',
        '-webkit-backface-visibility:hidden',
        'transform:' + tf,
        '-webkit-transform:' + tf,
        'cursor:pointer',
        'box-shadow:0 0 0 1px rgba(201,168,76,.18),0 8px 40px rgba(0,0,0,.75)'
      ].join(';');

      /* Marco de imagen */
      var daf = p.querySelector('.daf');
      if(daf){
        daf.style.cssText = [
          'width:100%', 'height:100%',
          'max-width:none', 'aspect-ratio:unset',
          'box-shadow:none',
          'position:relative'
        ].join(';');
        var dai = daf.querySelector('.dai');
        if(dai) dai.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      }

      /* Hover highlight */
      p.addEventListener('mouseenter', function(){
        p.style.boxShadow = '0 0 0 2px rgba(249,32,74,.7),0 8px 60px rgba(249,32,74,.25)';
      });
      p.addEventListener('mouseleave', function(){
        p.style.boxShadow = '0 0 0 1px rgba(201,168,76,.18),0 8px 40px rgba(0,0,0,.75)';
      });

      ring.appendChild(p);
    });

    /* Perspectiva en el contenedor padre */
    dgl.style.perspective       = '1100px';
    dgl.style.perspectiveOrigin = '50% 45%';
    dgl.style.overflow          = 'visible';
    dgl.appendChild(ring);

    /* Desactivar slideshow original */
    // standalone - no slideshow

    /* Rotación suave */
    var rot = 0, running = true, raf;
    function tick(){
      rot += 0.13;
      var t = 'rotateX(-15deg) rotateY(' + rot + 'deg)';
      ring.style.transform = t;
      ring.style.webkitTransform = t;
      if(running) raf = requestAnimationFrame(tick);
    }
    tick();

    /* Pausar al hacer hover */
    dgl.addEventListener('mouseenter', function(){ running = false; cancelAnimationFrame(raf); });
    dgl.addEventListener('mouseleave', function(){ if(!running){ running = true; tick(); } });

    /* Conectar con open/close DA */
    var _close = window.closeDA;
    window.closeDA = function(){
      running = false; cancelAnimationFrame(raf);
      if(_close) _close.call(this);
    };
    var _open = window.openDA;
    window.openDA = function(){
      if(_open) _open.call(this);
      if(!running){ running = true; tick(); }
    };
  }

  /* Correr inmediatamente + doble fallback */
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initCylinder);
  } else {
    initCylinder();
  }
  setTimeout(initCylinder, 800);
})();
</s

<script>
/* Cursor paint trail */
(function(){
  // Wait for #da to exist, then inject canvas inside it
  function init() {
    var da = document.getElementById('da');
    if (!da) { setTimeout(init, 100); return; }

    var cv = document.createElement('canvas');
    cv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
    da.appendChild(cv);

    function resize() {
      cv.width  = da.offsetWidth  || window.innerWidth;
      cv.height = da.offsetHeight || window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    var ctx = cv.getContext('2d');
    var particles = [];
    var lx = -999, ly = -999;

    document.addEventListener('mousemove', function(e) {
      var mx = e.clientX, my = e.clientY;
      var dist = Math.hypot(mx - lx, my - ly);
      var count = Math.min(Math.floor(dist / 3) + 2, 10);
      for (var i = 0; i < count; i++) {
        var t = i / count;
        var px = lx + (mx - lx) * t;
        var py = ly + (my - ly) * t;
        for (var j = 0; j < 3; j++) {
          var angle = Math.random() * Math.PI * 2;
          var spread = Math.random() * 6;
          particles.push({
            x: px + Math.cos(angle) * spread,
            y: py + Math.sin(angle) * spread,
            rx: 3 + Math.random() * 9,
            ry: 1.5 + Math.random() * 4,
            rot: Math.atan2(my - ly, mx - lx) + (Math.random() - 0.5) * 0.8,
            alpha: 0.7 + Math.random() * 0.3,
            decay: 0.006 + Math.random() * 0.01
          });
        }
      }
      lx = mx; ly = my;
    });

    function loop() {
      var W = cv.width, H = cv.height;
      ctx.clearRect(0, 0, W, H);
      for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.alpha -= p.decay;
        if (p.alpha <= 0) { particles.splice(i, 1); continue; }
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        var g = ctx.createRadialGradient(0, 0, 0, 0, 0, p.rx);
        g.addColorStop(0,   'rgba(249,32,74,' + p.alpha + ')');
        g.addColorStop(0.5, 'rgba(220,10,50,' + (p.alpha * 0.6) + ')');
        g.addColorStop(1,   'rgba(180,0,30,0)');
        ctx.scale(1, p.ry / p.rx);
        ctx.beginPath();
        ctx.arc(0, 0, p.rx, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.restore();
      }
      requestAnimationFrame(loop);
    }
    loop();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
